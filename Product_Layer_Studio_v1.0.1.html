<!doctype html><html><head><meta charset='utf-8'><title>Product Layer Studio v1.0.1</title><style>
body{margin:0;font-family:Arial;background:#1d2127;color:#eee;display:flex;height:100vh}#l{width:360px;background:#2b313a;padding:16px;overflow:auto}#r{flex:1;display:flex;justify-content:center;align-items:center;background:#111}.c{background:#39414d;padding:10px;border-radius:10px;margin-bottom:10px}input,select,textarea{width:100%;padding:8px;margin-top:4px}button{padding:10px;margin-top:8px}canvas{background:#fff;width:720px;height:720px}
</style></head><body><div id=l><h2>🎨 Product Layer Studio v1.0.1</h2>
<div class=c><input type=file id=hero><select id=tpl><option>LX-01</option><option>MT-01</option><option>CP-01</option><option>MN-01</option><option>PG-01</option></select>
<select id=pos><option>Center</option><option>Left</option><option>Right</option></select>
<input id=title value='Nama Produk'><textarea id=hl>• Highlight 1
• Highlight 2
• Highlight 3</textarea><input id=badge value='HOT ITEM'></div>
<div class=c><button onclick='copyPrompt()'>Copy Prompt</button><button onclick='savePrompt()'>Save Prompt</button><div id=dna>DNA Produk (placeholder)</div></div></div>
<div id=r><canvas id=cv width=1080 height=1080></canvas></div>
<script>
const ctx=cv.getContext('2d');let img=null;
function draw(){let g=ctx.createLinearGradient(0,0,1080,1080);let t=tpl.value;if(t.startsWith('LX')){g.addColorStop(0,'#c62828');g.addColorStop(1,'#fff2df');}else if(t.startsWith('MT')){g.addColorStop(0,'#0d47a1');g.addColorStop(1,'#26c6da');}else if(t.startsWith('CP')){g.addColorStop(0,'#ff6f00');g.addColorStop(1,'#ffd54f');}else if(t.startsWith('MN')){g.addColorStop(0,'#f5f5f5');g.addColorStop(1,'#ddd');}else{g.addColorStop(0,'#8e24aa');g.addColorStop(1,'#42a5f5');}ctx.fillStyle=g;ctx.fillRect(0,0,1080,1080);ctx.strokeStyle='rgba(255,255,255,.25)';ctx.strokeRect(40,40,1000,1000);ctx.fillStyle='#fff';ctx.font='bold 54px Arial';ctx.fillText(title.value,60,120);ctx.fillStyle='#ff3d00';ctx.fillRect(60,145,230,55);ctx.fillStyle='#fff';ctx.font='bold 28px Arial';ctx.fillText(badge.value,75,180);// Highlight Typography Engine v1.0.1 (LOCKED TEXT)
let y=250;
const lines=hl.value.split('\n');
lines.forEach((l,i)=>{
 if(t.startsWith('LX')){
   ctx.font='bold 32px Arial';ctx.fillStyle='#fff';ctx.fillText(l,60,y);
 }else if(t.startsWith('MT')){
   ctx.font='bold 30px Arial';ctx.fillStyle='#e8f5ff';ctx.fillText('✓ '+l.replace(/^•\s*/,''),60,y);
 }else if(t.startsWith('CP')){
   ctx.font='italic bold 30px Arial';ctx.fillStyle='#fff';ctx.fillText(l,60,y);
 }else if(t.startsWith('MN')){
   ctx.font='28px Arial';ctx.fillStyle='#222';ctx.fillText(l,60,y);
 }else{
   ctx.font='bold 31px Arial';ctx.fillStyle='#fff';ctx.fillText(l,60,y);
 }
 y+=42;
});
if(img){let s=.55,w=img.width*s,h=img.height*s,r=Math.min(600/w,600/h);w*=r;h*=r;let x=(1080-w)/2;if(pos.value=='Left')x=120;if(pos.value=='Right')x=1080-w-120;let yy=(1080-h)/2+90;ctx.shadowColor='rgba(0,0,0,.35)';ctx.shadowBlur=28;ctx.drawImage(img,x,yy,w,h);ctx.shadowBlur=0;}}
hero.onchange=e=>{let f=e.target.files[0];if(!f)return;img=new Image();img.onload=()=>{draw();dna.innerHTML='DNA akan dianalisa oleh AI Engine';};img.src=URL.createObjectURL(f);}
[tpl,pos,title,hl,badge].forEach(i=>i.oninput=draw);draw();
function promptText(){return `COMMERCIAL PRODUCT DESIGN

Template: ${tpl.value}
Hero Position: ${pos.value}

Do NOT recreate or modify Hero Product.
Background follows Product DNA.
Design only surrounding area.
Typography and badge may overlap Hero slightly.
Title: ${title.value}
Highlights (LOCKED):
${hl.value}

Highlight Typography Engine:
- AI must NOT modify highlight words.
- AI only designs typography.
- Use template Highlight Typography DNA.

Badge: ${badge.value}`;}
function copyPrompt(){navigator.clipboard.writeText(promptText());alert('Prompt copied');}
function savePrompt(){let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([promptText()],{type:'text/plain'}));a.download='prompt.txt';a.click();}
</script></body></html>
